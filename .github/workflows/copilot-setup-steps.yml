name: Copilot Setup Steps

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - mise.toml
      - web/package.json
      - web/package-lock.json
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml
      - mise.toml
      - web/package.json
      - web/package-lock.json

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Install mise
        run: |
          curl https://mise.run | sh
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install configured toolchains
        run: mise install

      - name: Install frontend dependencies
        working-directory: web
        run: npm ci
